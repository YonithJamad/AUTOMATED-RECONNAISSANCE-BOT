<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reconnaissance Bot - Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-main: #ffffff;
            --text-main: #000000;
            --text-muted: rgba(0, 0, 0, 0.6);
            --border-color: #dee2e6;
            --accent: #000000;
            --grid-color: #f0f0f0;
            --scanline-color: rgba(0, 0, 0, 0.05);
        }

        [data-bs-theme="dark"] {
            --bg-main: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
            --border-color: #333333;
            --accent: #ffffff;
            --grid-color: rgba(255, 255, 255, 0.05);
            --scanline-color: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .header {
            padding: 30px 60px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            background: transparent;
            position: relative;
            z-index: 100;
        }

        .project-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-main);
            margin: 0;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-login {
            background: var(--text-main);
            color: var(--bg-main);
            border: 1px solid var(--text-main);
            padding: 8px 20px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-login:hover {
            background: transparent;
            color: var(--text-main);
        }

        .divider {
            height: 4px;
            background-color: #000;
            margin: 0;
            width: 100%;
        }

        [data-bs-theme="dark"] .divider {
            background-color: #fff;
        }

        .main-content {
            padding: 20px 40px 100px 40px;
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .tag-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 60px 0;
            max-width: 900px;
        }

        .tag-one {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-main);
            margin-bottom: 10px;
        }

        .tag-two {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-muted);
            margin: 0 auto;
            max-width: 500px;
        }

        .tool-section {
            width: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding-top: 40px;
        }

        .tool-section-title {
            font-size: 1.0rem;
            font-weight: 800;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0;
        }

        .tool-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
        }

        @media (max-width: 1400px) {
            .tool-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 1100px) {
            .tool-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 800px) {
            .tool-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .tool-grid {
                grid-template-columns: 1fr;
            }
        }

        .tool-card {
            background: rgba(0, 0, 0, 0.02);
            border: 1px solid var(--border-color);
            padding: 20px 25px;
            border-radius: 6px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            text-align: left;
            gap: 12px;
        }

        [data-bs-theme="dark"] .tool-card {
            background: rgba(255, 255, 255, 0.03);
        }

        .tool-card:hover {
            transform: translateY(-4px);
            border-color: var(--text-main);
        }

        .tool-icon {
            width: 24px;
            height: 24px;
            color: var(--text-main);
            opacity: 0.8;
            flex-shrink: 0;
            transition: opacity 0.3s ease;
        }

        .tool-card:hover .tool-icon {
            opacity: 1;
        }

        .tool-name {
            font-weight: 800;
            font-size: 1.0rem;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .scanline {
            width: 100%;
            position: fixed;
            pointer-events: none;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(0deg, transparent 0%, var(--scanline-color) 50%, transparent 100%);
            height: 100px;
            animation: scanline 8s linear infinite;
            z-index: 100;
        }

        @keyframes scanline {
            0% {
                transform: translateY(-100%);
            }

            100% {
                transform: translateY(100vh);
            }
        }

        .logo-img {
            height: 80px;
            width: auto;
        }
    </style>
</head>

<body>
    <div class="scanline"></div>
    <header class="header" style="justify-content: space-between; align-items: center;">
        <div class="logo-container">
            <img src="{{ url_for('login_static', path='logo.svg') }}" alt="Logo" class="logo-img">
        </div>
        <a href="/login" class="btn-login">Log in</a>
    </header>



    <main class="main-content">
        <div class="tag-container">
            <h1 class="tag-one">AUTOMATED RECONNAISSANCE BOT</h1>
            <p class="tag-two">Automated data collection for comprehensive security surface discovery mapping.</p>
        </div>

        <div class="tool-section">
            <h3 class="tool-section-title">INTEGRATED TOOLS</h3>
            <div class="tool-grid">
                <div class="tool-card">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <path d="M12 16v-4" />
                        <path d="M12 8h.01" />
                    </svg>
                    <div class="tool-name">WHOIS</div>
                </div>
                <div class="tool-card">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z" />
                        <circle cx="12" cy="10" r="3" />
                    </svg>
                    <div class="tool-name">GEOIP LOOKUP</div>
                </div>
                <div class="tool-card">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0Z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    <div class="tool-name">SHODAN</div>
                </div>
                <div class="tool-card">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m19.071 4.929-1.414 1.414" />
                        <path d="m14.828 9.172-1.414 1.414" />
                        <path d="m4.929 19.071 1.414-1.414" />
                        <path d="m9.172 14.828 1.414-1.414" />
                        <path d="M15 9V3h6v6h-6Z" />
                        <path d="M9 15v6H3v-6h6Z" />
                    </svg>
                    <div class="tool-name">NMAP</div>
                </div>
                <div class="tool-card">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z" />
                        <path d="m9 12 2 2 4-4" />
                    </svg>
                    <div class="tool-name">NIKTO</div>
                </div>
                <div class="tool-card">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                    <div class="tool-name">AMASS</div>
                </div>
                <div class="tool-card">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                    </svg>
                    <div class="tool-name">WAYBACK MACHINE</div>
                </div>
                <div class="tool-card">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 18 22 12 16 6" />
                        <polyline points="8 6 2 12 8 18" />
                    </svg>
                    <div class="tool-name">WAPPALYZER</div>
                </div>
                <div class="tool-card">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                    <div class="tool-name">GOOGLE DORKING</div>
                </div>
                <div class="tool-card">
                    <svg class="tool-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M11 20A7 7 0 0 1 4 13V5a2 2 0 0 1 2-2h5V2h2v1h5a2 2 0 0 1 2 2v8a7 7 0 0 1-7 7Z" />
                        <path d="M21 14h-1" />
                        <path d="M3 14h1" />
                        <path d="M12 22v-2" />
                    </svg>
                    <div class="tool-name">THE HARVESTER</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function updateTheme() {
            const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            document.documentElement.setAttribute('data-bs-theme', isDark ? 'dark' : 'light');
        }
        window.matchMedia("(prefers-color-scheme: dark)").addEventListener('change', updateTheme);
        updateTheme();
    </script>
</body>

</html>
